<!-- Contenido -->

  <p class="mensaje">
    No sé en qué momento pasaste de ser alguien especial…  
    a ser absolutamente todo 🥹
  </p>

  <!-- Carrusel -->
  <div class="carrusel-container">
    <div class="carrusel">

      <!-- originales -->
      <img src="img 1.jpeg">

      <img src="img 3.jpeg">

      <img src="img 1.jpeg">
      <img src="img 2.jpeg">
      <img src="img 3.jpeg">
      <img src="img 4.jpeg">
      <img src="img 5.jpeg">
      <img src="img 6.jpeg">
      <img src="img 7.jpeg">
      <img src="img 8.jpeg">
      <img src="img 9.jpeg">

    </div>
  </div>

  <p class="mensaje">
    Contigo todo se siente bonito… eres mi lugar favorito 💫
  </p>

  <!-- Carta -->
  <div class="carta" onclick="abrirCarta(this)">
    <p>💌 Toca para abrir</p>
    <div class="contenido-carta">
      Eres mi paz, mi risa, mi todo…  
      y no quiero perderte nunca 💙
    </div>
  </div>

  <!-- Declaración -->
  <button onclick="mostrar()">Haz clic aquí 💙</button>

  <div id="declaracion" class="oculto">

    <button onclick="si()">Sí 💙</button>
    <button id="no">No 😢</button>

</html>
